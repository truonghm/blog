theme: "PaperMod"
baseURL: "https://truonghm.github.io/blog"
publishDir: "docs"
languageCode: en-us
title: truonghm

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

profileMode:
    enabled: true
    title: "truonghm"
    # imageUrl: "#"
    # imageTitle: my image
    # imageWidth: 120
    # imageHeight: 120
    subtitle: "Fear is the mind-killer"
    buttons:
        - name: Blog
          url: posts
        - name: Tags
          url: tags
menu:
    main:
        - name: Archive
          url: archives/
          weight: 5
        - name: Tags
          url: tags
          weight: 10
        - name: Categories
          url: categories
          weight: 10
        - name: Series
          url: series
          weight: 10
          
outputs:
    home:
        - HTML
        - RSS
        - JSON
        
params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    # description: "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
    author: truonghm
    # author: ["Me", "You"] # multiple authors

    defaultTheme: auto
    # disableThemeToggle: true
    ShowShareButtons: true
    ShowReadingTime: true
    # disableSpecial1stPost: true
    # displayFullLangName: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowToc: true
    # comments: false
    images: ["papermod-cover.png"]
    
    homeInfoParams:
        Title: "Truong Hoang"
        Content: >
            Welcome to my blog. This is where I attempt to write about what I learn, including, 
            
            but not limited to data science and math. 
          
    
    socialIcons:
        - name: github
          url: "https://github.com/truonghm"
        - name: linkedin
          url: "https://www.linkedin.com/in/truonghm"
        - name: RsS
          url: "index.xml"
          
taxonomies:
    category: categories
    tag: tags
    series: series

markup:
     goldmark:
        renderer:
            unsafe: true
            
privacy:
    vimeo:
        disabled: false
        simple: true

    twitter:
        disabled: false
        enableDNT: true
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    twitter:
        disableInlineCSS: true
